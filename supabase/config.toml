project_id = "unvxagsledbsdoremqeb"
# Resend calls this webhook unauthenticated — JWT verification must be off.
[functions.outreach-resend-webhook]
verify_jwt = false

# Twilio calls these unauthenticated.
[functions.twilio-sms-webhook]
verify_jwt = false

[functions.twilio-voice-webhook]
verify_jwt = false

# Called by pg_cron with x-cron-secret.
[functions.sms-process-outbox]
verify_jwt = false

# Called by the campus_waitlist DB trigger with x-cron-secret.
[functions.notify-waitlist]
verify_jwt = false

# Called by the orders DB trigger with x-order-secret (verified in-function).
[functions.notify-order]
verify_jwt = false

# Called by pg_cron with x-cron-secret.
[functions.outreach-scheduler]
verify_jwt = false

# ProfIntel send worker — pg_cron with x-cron-secret. Master kill-switch lives in
# profintel_settings.sending_enabled (default OFF).
[functions.profintel-send-worker]
verify_jwt = false

# Resend event webhook for ProfIntel opens — auth via ?secret= query param.
[functions.profintel-email-webhook]
verify_jwt = false

# Inbound-reply webhook for ProfIntel — auth via ?secret= query param.
[functions.profintel-inbound]
verify_jwt = false

# Called by pg_cron to drive the batch campus research worker.
[functions.run-campus-batch]
verify_jwt = false

# Operator-facing read-only config (no secret values exposed).
[functions.sms-config]
verify_jwt = false
